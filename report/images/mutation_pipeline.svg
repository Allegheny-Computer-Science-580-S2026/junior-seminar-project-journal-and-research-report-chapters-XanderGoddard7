<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480">
  <style>
    .box { fill: #ffffff; stroke: #222; stroke-width:3px; rx:14; }
    .small { font-family: 'Segoe UI', Roboto, Arial; font-size:14px; fill:#111 }
    .title { font-family: 'Segoe UI', Roboto, Arial; font-size:18px; fill:#111 }
    .arrow { stroke:#222; stroke-width:3px; fill:none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#222" />
    </marker>
  </defs>
  <!-- Left original script -->
  <rect x="30" y="180" width="160" height="80" class="box"/>
  <text x="110" y="225" class="small" text-anchor="middle">script.py</text>

  <!-- Fork arrows -->
  <path d="M190 200 C260 120, 360 120, 420 200" class="arrow"/>
  <path d="M190 240 C260 320, 360 320, 420 240" class="arrow"/>

  <!-- Mutated branch -->
  <rect x="420" y="120" width="200" height="70" class="box"/>
  <text x="520" y="160" class="small" text-anchor="middle">mutated_script.py</text>
  <rect x="650" y="120" width="200" height="70" class="box"/>
  <text x="750" y="160" class="small" text-anchor="middle">agent1_script.py</text>
  <path d="M620 155 L650 155" class="arrow"/>

  <!-- Original branch -->
  <rect x="420" y="250" width="200" height="70" class="box"/>
  <text x="520" y="290" class="small" text-anchor="middle">original_script.py</text>
  <rect x="650" y="250" width="200" height="70" class="box"/>
  <text x="750" y="290" class="small" text-anchor="middle">agent2_script.py</text>
  <path d="M620 285 L650 285" class="arrow"/>

  <!-- Compare box -->
  <rect x="920" y="190" width="220" height="120" class="box"/>
  <text x="1030" y="230" class="small" text-anchor="middle">Compare Scripts</text>
  <text x="1030" y="255" class="small" text-anchor="middle">Behavioral & Functional</text>

  <!-- connections to compare -->
  <path d="M850 155 L920 215" class="arrow"/>
  <path d="M850 285 L920 245" class="arrow"/>

  <!-- result box -->
  <rect x="1030" y="330" width="140" height="70" class="box"/>
  <text x="1100" y="370" class="small" text-anchor="middle">Found robustness</text>

  <!-- Title -->
  <text x="600" y="40" class="title" text-anchor="middle">LLM-Mutator Mutation-Fork Evaluation Pipeline</text>
</svg>
